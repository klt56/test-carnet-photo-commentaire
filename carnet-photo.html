<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Carnet photo ROBOPLANET</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1A1F36; --navy-soft:#21273f; --navy-line:rgba(255,255,255,.09);
    --orange:#D94215; --orange-dim:#b8360f; --ink-dim:#9aa0b8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--navy);color:#fff;font-family:"DM Sans",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100vh;max-width:920px;margin:0 auto;padding:22px 16px 70px}
  .btn{appearance:none;border:0;cursor:pointer;font-family:inherit;font-weight:700;background:var(--orange);color:#fff;padding:12px 20px;border-radius:10px;font-size:15px;transition:background .15s,transform .05s}
  .btn:hover{background:var(--orange-dim)} .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn.ghost{background:transparent;border:1px solid var(--navy-line);color:#fff;font-weight:500;font-size:13px;padding:9px 13px}
  .btn.ghost:hover{background:rgba(255,255,255,.06)}
  .btn:focus-visible{outline:2px solid #fff;outline-offset:2px}
  input[type=file]{display:none}
 
  /* Écran de démarrage */
  .setup{position:fixed;inset:0;background:var(--navy);display:none;align-items:center;justify-content:center;padding:24px;z-index:50}
  .setup.show{display:flex}
  .setup .box{width:100%;max-width:420px;text-align:center}
  .setup .dot{display:inline-block;width:12px;height:12px;border-radius:3px;background:var(--orange);margin-bottom:14px}
  .setup h1{font-family:"DM Serif Display",serif;font-weight:400;font-size:30px;margin-bottom:8px}
  .setup p{color:var(--ink-dim);font-size:14px;margin-bottom:22px;line-height:1.5}
  .setup input{width:100%;background:var(--navy-soft);border:1px solid var(--navy-line);border-radius:11px;color:#fff;font-family:inherit;font-size:17px;padding:14px;text-align:center;margin-bottom:14px}
  .setup input:focus{outline:none;border-color:var(--orange)}
 
  /* En-tête */
  header{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  header .dot{width:11px;height:11px;border-radius:2px;background:var(--orange)}
  #bookName{font-family:"DM Serif Display",serif;font-size:27px;font-weight:400;background:transparent;border:0;border-bottom:1px solid transparent;color:#fff;padding:2px 0;min-width:160px;flex:1}
  #bookName:hover{border-bottom-color:var(--navy-line)} #bookName:focus{outline:none;border-bottom-color:var(--orange)}
  .tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  select{background:var(--navy-soft);border:1px solid var(--navy-line);color:#fff;font-family:inherit;font-size:13px;padding:9px 10px;border-radius:9px}
  .count{color:var(--ink-dim);font-size:13px;margin:2px 0 22px}
 
  /* Formulaire d'ajout / édition */
  .add{background:var(--navy-soft);border:1px solid var(--navy-line);border-radius:16px;padding:16px;margin-bottom:26px;transition:border-color .2s}
  .add.editing{border-color:var(--orange)}
  .editbadge{display:none;font-size:12px;font-weight:700;color:var(--orange);margin-bottom:10px}
  .add.editing .editbadge{display:block}
  .add .grid{display:grid;grid-template-columns:1fr 250px;gap:16px}
  .add label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-dim);margin:0 0 6px}
  .add input[type=text],.add textarea{width:100%;background:var(--navy);border:1px solid var(--navy-line);border-radius:9px;color:#fff;font-family:inherit;font-size:15px;padding:11px 12px}
  .add input:focus,.add textarea:focus{outline:none;border-color:var(--orange)}
  .add textarea{min-height:64px;resize:vertical}
  .add .foot{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
 
  /* Bandeau de photos en attente */
  .strip{display:flex;flex-wrap:wrap;gap:8px}
  .pthumb{position:relative;width:72px;height:54px;border-radius:9px;overflow:hidden;background:#0b0e1c}
  .pthumb img{width:100%;height:100%;object-fit:cover;cursor:pointer;display:block}
  .pthumb .x{position:absolute;top:2px;right:2px;width:20px;height:20px;border:0;border-radius:6px;background:rgba(0,0,0,.62);color:#fff;font-size:14px;line-height:18px;text-align:center;cursor:pointer;padding:0}
  .pthumb .x:hover{background:var(--orange)}
  .pthumb .edit{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);color:#fff;font-size:10px;text-align:center;padding:2px 0;pointer-events:none}
  .padd{width:72px;height:54px;border-radius:9px;border:1.5px dashed rgba(217,66,21,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--ink-dim);cursor:pointer;font-size:11px;gap:2px}
  .padd:hover{border-color:var(--orange)} .padd .big{font-size:18px}
 
  /* Tableau */
  .thead,.row{display:grid;grid-template-columns:150px 1.1fr 1.7fr 44px;gap:14px;align-items:center}
  .thead{padding:0 14px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-dim)}
  .row{background:var(--navy-soft);border:1px solid var(--navy-line);border-radius:13px;padding:12px 14px;margin-bottom:12px}
  /* Grille 2 lignes, remplie colonne par colonne, écarts égaux */
  .row .photos{display:grid;grid-template-rows:repeat(2,auto);grid-auto-flow:column;grid-auto-columns:max-content;gap:5px;overflow-x:auto;padding-bottom:2px}
  .row .photos img{width:72px;height:54px;border-radius:6px;object-fit:contain;background:#0b0e1c;cursor:pointer}
  .row .rtitle{font-weight:700;font-size:15px;word-break:break-word}
  .row .rcomment{font-size:14px;line-height:1.45;color:#dfe2f0;white-space:pre-wrap;word-break:break-word}
  .row .rwhen{font-size:11px;color:var(--ink-dim);margin-top:5px}
  .row .acts{display:flex;flex-direction:column;gap:4px;align-items:center}
  .row .acts button{background:transparent;border:0;cursor:pointer;line-height:1;padding:4px;font-size:17px;color:var(--ink-dim)}
  .row .acts .edit:hover{color:#fff}
  .row .acts .del:hover{color:var(--orange)}
  .empty{color:var(--ink-dim);font-size:14px;text-align:center;padding:26px;border:1px dashed var(--navy-line);border-radius:13px}
 
  /* Lightbox */
  .lb{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;padding:20px;z-index:60;cursor:zoom-out}
  .lb.show{display:flex} .lb img{max-width:100%;max-height:100%;border-radius:8px}
 
  /* Éditeur recadrage / rotation */
  .crop{position:fixed;inset:0;background:#0b0e1c;display:none;flex-direction:column;z-index:80}
  .crop.show{display:flex}
  .crop .area{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:14px;overflow:hidden}
  .crop .area img{max-width:100%;max-height:100%;display:block}
  .crop .bar{display:flex;gap:8px;justify-content:center;align-items:center;padding:14px 14px calc(14px + env(safe-area-inset-bottom));flex-wrap:wrap;background:var(--navy);border-top:1px solid var(--navy-line)}
 
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#fff;color:var(--navy);font-weight:700;font-size:14px;padding:12px 18px;border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:90}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
 
  @media (max-width:560px){
    .add .grid{grid-template-columns:1fr}
    .thead{display:none}
    .row{grid-template-columns:1fr;gap:8px;position:relative}
    .row .photos img{width:84px;height:63px}
    .row .acts{position:absolute;top:8px;right:8px;flex-direction:row;background:rgba(0,0,0,.5);border-radius:8px}
  }
  canvas{display:none}
</style>
 
<!-- Écran : nommer le tableau -->
<div class="setup" id="setup">
  <div class="box">
    <span class="dot"></span>
    <h1>Nouveau tableau</h1>
    <p>Donne un nom à ce carnet. Toutes tes entrées s'ajouteront dedans jusqu'à ce que tu en crées un autre.</p>
    <input type="text" id="setupName" placeholder="ex. Inspection cuve A156 — 09/06">
    <button class="btn" id="setupGo" style="width:100%">Créer le tableau</button>
  </div>
</div>
 
<!-- App -->
<div id="app" style="display:none">
  <header>
    <span class="dot"></span>
    <input id="bookName" aria-label="Nom du tableau">
    <div class="tools">
      <select id="bookSwitch" aria-label="Changer de tableau"></select>
      <button class="btn ghost" id="newBook">+ Tableau</button>
      <button class="btn ghost" id="logoBtn">Logo</button>
      <button class="btn" id="wordBtn">Word (.docx)</button>
    </div>
  </header>
  <div class="count" id="count"></div>
 
  <div class="add" id="addBox">
    <div class="editbadge" id="editBadge">✎ Modification d'une entrée existante</div>
    <div class="grid">
      <div>
        <label for="title">Titre de l'entrée</label>
        <input type="text" id="title" placeholder="ex. Virole 3 — corrosion zone basse">
        <label for="comment" style="margin-top:12px">Commentaire</label>
        <textarea id="comment" placeholder="Observation, mesure, repère…"></textarea>
      </div>
      <div>
        <label>Photos (clique une vignette pour recadrer / pivoter)</label>
        <div class="strip" id="photoStrip"></div>
      </div>
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment" multiple>
    <input type="file" id="logoInput" accept="image/*">
    <div class="foot">
      <button class="btn ghost" id="cancelEdit" style="display:none">Annuler la modification</button>
      <button class="btn" id="addBtn" disabled>Ajouter au tableau</button>
    </div>
  </div>
 
  <div class="thead"><div>Photos</div><div>Titre</div><div>Commentaire</div><div></div></div>
  <div id="rows"></div>
</div>
 
<!-- Lightbox -->
<div class="lb" id="lb"><img id="lbImg" alt=""></div>
 
<!-- Éditeur de recadrage -->
<div class="crop" id="crop">
  <div class="area"><img id="cropImg" alt=""></div>
  <div class="bar">
    <button class="btn ghost" id="rotL">↺ Pivoter</button>
    <button class="btn ghost" id="rotR">↻ Pivoter</button>
    <button class="btn ghost" id="cropReset">Réinitialiser</button>
    <button class="btn ghost" id="cropCancel">Annuler</button>
    <button class="btn" id="cropOk">Valider la photo</button>
  </div>
</div>
 
<div class="toast" id="toast"></div>
<canvas id="cv"></canvas>
 
<script>
const $ = s => document.querySelector(s);
const toast = (msg) => { const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); };
const RATIO = 4/3; // format unique de toutes les photos
 
/* Stockage : localStorage si dispo (fichier ouvert/déployé), sinon mémoire (aperçu) */
const store = (() => {
  let mem = {}, ok = false;
  try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); ok = true; } catch(e){}
  return {
    get(k){ if(ok){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){} } return mem[k]??null; },
    set(k,v){ if(ok){ try{ localStorage.setItem(k,JSON.stringify(v)); return; }catch(e){} } mem[k]=v; }
  };
})();
 
let data = store.get('carnet') || { books:{}, current:null, logo:null };
if(!('logo' in data)) data.logo = null;
for(const id in data.books){ for(const en of data.books[id].entries){
  if(en.photo && !en.photos){ en.photos=[en.photo]; delete en.photo; }
  if(!Array.isArray(en.photos)) en.photos=[];
}}
 
let pendingPhotos = [];
let editingId = null;
const save = () => store.set('carnet', data);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
 
/* Démarrage */
function boot(){
  const ids = Object.keys(data.books);
  if(!ids.length || !data.current || !data.books[data.current]) openSetup();
  else openApp();
}
function openSetup(){ $('#setup').classList.add('show'); $('#app').style.display='none'; $('#setupName').value=''; $('#setupName').focus(); }
function openApp(){ $('#setup').classList.remove('show'); $('#app').style.display='block'; renderStrip(); render(); }
 
$('#setupGo').onclick = createBook;
$('#setupName').addEventListener('keydown', e => { if(e.key==='Enter') createBook(); });
function createBook(){
  const name = $('#setupName').value.trim() || 'Tableau sans nom';
  const id = uid();
  data.books[id] = { name, entries:[] };
  data.current = id; save(); openApp();
}
$('#newBook').onclick = openSetup;
 
/* Nom du tableau */
$('#bookName').addEventListener('input', e => { data.books[data.current].name = e.target.value; save(); refreshSwitch(); });
 
/* Changement de tableau */
$('#bookSwitch').onchange = e => { data.current = e.target.value; save(); cancelEdit(); render(); };
function refreshSwitch(){
  const sel = $('#bookSwitch');
  sel.innerHTML = Object.entries(data.books)
    .map(([id,b]) => `<option value="${id}">${(b.name||'Sans nom').replace(/</g,'&lt;')}</option>`).join('');
  sel.value = data.current;
}
 
/* Logo */
$('#logoBtn').onclick = () => $('#logoInput').click();
$('#logoInput').onclick = e => { e.target.value=''; };
$('#logoInput').onchange = e => {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => resize(r.result, {max:400, mime:'image/png'}, out => { data.logo = out; save(); refreshLogoBtn(); toast('Logo enregistré'); });
  r.readAsDataURL(f);
};
function refreshLogoBtn(){ $('#logoBtn').textContent = data.logo ? 'Logo ✓' : 'Logo'; }
 
/* Redimensionnement à l'import */
function resize(src, opt, cb){
  const img = new Image();
  img.onload = () => {
    let w=img.naturalWidth, h=img.naturalHeight;
    const r = Math.min(1, opt.max/Math.max(w,h)); w=Math.round(w*r); h=Math.round(h*r);
    const c=$('#cv'); c.width=w; c.height=h;
    const ctx=c.getContext('2d');
    if(opt.mime==='image/jpeg'){ ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); }
    ctx.drawImage(img,0,0,w,h);
    cb(c.toDataURL(opt.mime, opt.mime==='image/jpeg'?0.82:undefined));
  };
  img.src = src;
}
 
/* Uniformisation : place chaque photo dans une boîte W×H identique, image entière
   visible (le vide éventuel est comblé en blanc). */
function normalize(src, W, H){
  return new Promise(res=>{
    const i=new Image();
    i.onload=()=>{
      const c=document.createElement('canvas'); c.width=W; c.height=H;
      const x=c.getContext('2d'); x.fillStyle='#fff'; x.fillRect(0,0,W,H);
      const r=Math.min(W/i.naturalWidth, H/i.naturalHeight); // contain : image entière
      const w=i.naturalWidth*r, h=i.naturalHeight*r;
      x.drawImage(i,(W-w)/2,(H-h)/2,w,h);
      res(c.toDataURL('image/jpeg',0.85));
    };
    i.src=src;
  });
}
 
/* Sélection de photos (multiple) */
$('#fileInput').onclick = e => { e.target.value=''; };
$('#fileInput').onchange = async e => {
  const files = [...e.target.files]; if(!files.length) return;
  for(const f of files){
    await new Promise(res => { const rd=new FileReader(); rd.onload=()=>resize(rd.result,{max:1280,mime:'image/jpeg'},out=>{ pendingPhotos.push(out); res(); }); rd.readAsDataURL(f); });
  }
  renderStrip();
  if(files.length === 1) openCrop(pendingPhotos.length-1);
};
 
/* Bandeau des photos en attente */
function renderStrip(){
  const strip = $('#photoStrip'); strip.innerHTML='';
  pendingPhotos.forEach((src,i)=>{
    const t=document.createElement('div'); t.className='pthumb';
    t.innerHTML = `<img src="${src}" alt=""><button class="x" title="Retirer">×</button><span class="edit">éditer</span>`;
    t.querySelector('img').onclick = () => openCrop(i);
    t.querySelector('.x').onclick = (ev) => { ev.stopPropagation(); pendingPhotos.splice(i,1); renderStrip(); };
    strip.appendChild(t);
  });
  const add=document.createElement('div'); add.className='padd';
  add.innerHTML = '<span class="big">📷</span><span>+ photo</span>';
  add.onclick = () => $('#fileInput').click();
  strip.appendChild(add);
  $('#addBtn').disabled = pendingPhotos.length===0;
}
 
/* ---- Recadrage / rotation (Cropper.js), recadrage libre ---- */
let cropperReady=null, cropper=null, cropIndex=-1;
function loadCropper(){
  if(window.Cropper) return Promise.resolve(window.Cropper);
  if(cropperReady) return cropperReady;
  cropperReady = new Promise((res,rej)=>{
    const css=document.createElement('link'); css.rel='stylesheet';
    css.href='https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css';
    document.head.appendChild(css);
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js';
    s.onload=()=>window.Cropper?res(window.Cropper):rej(new Error('global'));
    s.onerror=()=>rej(new Error('cdn'));
    document.head.appendChild(s);
  });
  return cropperReady;
}
async function openCrop(i){
  let C;
  try { C = await loadCropper(); }
  catch(e){ toast('Recadrage indisponible ici (fonctionne une fois déployé)'); return; }
  cropIndex = i;
  const img = $('#cropImg');
  $('#crop').classList.add('show');
  const init = () => { if(cropper) cropper.destroy(); cropper = new C(img, {viewMode:1, autoCropArea:1, background:false, responsive:true, checkOrientation:true}); };
  img.onload = init;
  img.src = pendingPhotos[i];
  if(img.complete && img.naturalWidth) init();
}
function closeCrop(){ if(cropper){ cropper.destroy(); cropper=null; } $('#crop').classList.remove('show'); cropIndex=-1; }
$('#rotL').onclick = () => cropper && cropper.rotate(-90);
$('#rotR').onclick = () => cropper && cropper.rotate(90);
$('#cropReset').onclick = () => cropper && cropper.reset();
$('#cropCancel').onclick = closeCrop;
$('#cropOk').onclick = () => {
  if(!cropper){ closeCrop(); return; }
  const canvas = cropper.getCroppedCanvas({maxWidth:1280, maxHeight:1280, imageSmoothingQuality:'high'});
  if(canvas && cropIndex>-1) pendingPhotos[cropIndex] = canvas.toDataURL('image/jpeg',0.85);
  closeCrop(); renderStrip();
};
 
/* Ajouter / enregistrer une entrée */
$('#addBtn').onclick = () => {
  if(!pendingPhotos.length) return;
  const b = data.books[data.current];
  if(editingId){
    const en = b.entries.find(x => x.id===editingId);
    if(en){ en.title=$('#title').value.trim(); en.comment=$('#comment').value.trim(); en.photos=pendingPhotos.slice(); }
    toast('Entrée modifiée');
  } else {
    b.entries.unshift({ id:uid(), title:$('#title').value.trim(), comment:$('#comment').value.trim(), photos:pendingPhotos.slice(), when:Date.now() });
  }
  save(); resetForm(); render(); $('#title').focus();
};
$('#cancelEdit').onclick = cancelEdit;
function cancelEdit(){ if(editingId) resetForm(); }
function resetForm(){
  editingId=null; pendingPhotos=[];
  $('#title').value=''; $('#comment').value='';
  $('#addBox').classList.remove('editing');
  $('#cancelEdit').style.display='none';
  $('#addBtn').textContent='Ajouter au tableau';
  renderStrip();
}
function editEntry(id){
  const en = data.books[data.current].entries.find(x => x.id===id); if(!en) return;
  editingId = id;
  $('#title').value = en.title||''; $('#comment').value = en.comment||'';
  pendingPhotos = en.photos.slice();
  $('#addBox').classList.add('editing');
  $('#cancelEdit').style.display='inline-block';
  $('#addBtn').textContent='Enregistrer les modifications';
  renderStrip();
  window.scrollTo({top:0, behavior:'smooth'});
}
 
/* Rendu écran */
function fmt(t){ const d=new Date(t);
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
 
function render(){
  const b = data.books[data.current];
  $('#bookName').value = b.name;
  refreshSwitch(); refreshLogoBtn();
  $('#count').textContent = b.entries.length + (b.entries.length>1?' entrées':' entrée');
  const rows = $('#rows');
  if(!b.entries.length){ rows.innerHTML = '<div class="empty">Ajoute ta première entrée ci-dessus.</div>'; return; }
  rows.innerHTML = '';
  b.entries.forEach(en => {
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `
      <div class="photos"></div>
      <div><div class="rtitle"></div><div class="rwhen">${fmt(en.when)}</div></div>
      <div class="rcomment"></div>
      <div class="acts"><button class="edit" title="Modifier">✎</button><button class="del" title="Supprimer">×</button></div>`;
    const ph = row.querySelector('.photos');
    en.photos.forEach(src => { const im=document.createElement('img'); im.src=src; im.onclick=()=>{ $('#lbImg').src=src; $('#lb').classList.add('show'); }; ph.appendChild(im); });
    row.querySelector('.rtitle').textContent = en.title || '(sans titre)';
    row.querySelector('.rcomment').textContent = en.comment || '';
    row.querySelector('.edit').onclick = () => editEntry(en.id);
    row.querySelector('.del').onclick = () => { if(editingId===en.id) resetForm(); b.entries = b.entries.filter(x => x.id !== en.id); save(); render(); };
    rows.appendChild(row);
  });
}
$('#lb').onclick = () => $('#lb').classList.remove('show');
 
/* ---------- Export Word (.docx) ---------- */
let docxReady = null;
function loadDocx(){
  if(window.docx) return Promise.resolve(window.docx);
  if(docxReady) return docxReady;
  docxReady = new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/docx@9/build/index.umd.js';
    s.onload=()=>window.docx?res(window.docx):rej(new Error('global'));
    s.onerror=()=>rej(new Error('cdn'));
    document.head.appendChild(s);
  });
  return docxReady;
}
function b64ToBytes(dataUrl){
  const bin = atob(dataUrl.split(',')[1]); const n=bin.length; const a=new Uint8Array(n);
  for(let i=0;i<n;i++) a[i]=bin.charCodeAt(i); return a;
}
function imgDims(src){ return new Promise(res=>{ const i=new Image(); i.onload=()=>res({w:i.naturalWidth,h:i.naturalHeight}); i.src=src; }); }
 
/* Taille uniforme des photos dans le Word (boîte 4:3, aussi grande que la colonne le permet) */
const PW=74, PH=Math.round(PW/RATIO);   // affiché dans le doc (px) ~74×56
const NORMW=PW*4, NORMH=PH*4;           // rendu net
 
$('#wordBtn').onclick = exportDocx;
async function exportDocx(){
  const btn=$('#wordBtn'); const old=btn.textContent;
  btn.disabled=true; btn.textContent='Génération…';
  let D;
  try { D = await loadDocx(); }
  catch(e){ btn.disabled=false; btn.textContent=old; toast('Module Word indisponible (vérifie le HTTPS / la connexion)'); return; }
 
  const { Document, Packer, Paragraph, TextRun, ImageRun, Table, TableRow, TableCell,
          WidthType, AlignmentType, BorderStyle, VerticalAlign, Header, Footer } = D;
  const NAVY='1A1F36', ORANGE='D94215', GREY='8A90A6', LINE='D8DBE3', BODY='2B2F45';
  const none={style:BorderStyle.NONE,size:0,color:'FFFFFF'};
  const noBorders={top:none,bottom:none,left:none,right:none,insideHorizontal:none,insideVertical:none};
  const b = data.books[data.current];
  const list = b.entries.slice().reverse();
 
  let headerKids;
  if(data.logo){
    const d = await imgDims(data.logo); const h=40, w=Math.round(h*d.w/d.h);
    headerKids=[ new Paragraph({ alignment:AlignmentType.RIGHT, children:[
      new ImageRun({ type:'png', data:b64ToBytes(data.logo), transformation:{width:w,height:h} }) ] }) ];
  } else {
    headerKids=[ new Paragraph({ alignment:AlignmentType.RIGHT, children:[
      new TextRun({ text:'ROBO', bold:true, color:NAVY, size:28, font:'Arial' }),
      new TextRun({ text:'PLANET', bold:true, color:ORANGE, size:28, font:'Arial' }) ] }) ];
  }
 
  const hcell = t => new TableCell({ shading:{fill:NAVY}, verticalAlign:VerticalAlign.CENTER,
    margins:{top:90,bottom:90,left:130,right:130},
    children:[ new Paragraph({ children:[ new TextRun({ text:t, bold:true, color:'FFFFFF', size:19, font:'Arial' }) ] }) ] });
  const rows=[ new TableRow({ tableHeader:true, children:[ hcell('N°'), hcell('Photos'), hcell('Titre'), hcell('Commentaire') ] }) ];
 
  const GAP=30; // marge égale autour de chaque photo (twips) -> écarts réguliers
  let n=1;
  for(const en of list){
    const norm=[];
    for(const p of en.photos) norm.push(await normalize(p, NORMW, NORMH));
 
    let photoCell;
    if(!norm.length){
      photoCell = new TableCell({ verticalAlign:VerticalAlign.CENTER, margins:{top:110,bottom:110,left:130,right:130},
        children:[ new Paragraph({ children:[ new TextRun({ text:'—', font:'Arial', size:18, color:GREY }) ] }) ] });
    } else {
      const cols = Math.ceil(norm.length/2);
      const colW = PW*15 + GAP*2;
      const mkImg = (src)=> new Paragraph({ children:[ new ImageRun({ type:'jpg', data:b64ToBytes(src), transformation:{width:PW,height:PH} }) ] });
      const blank = ()=> new Paragraph({ children:[] });
      const nbRows = norm.length>=2 ? 2 : 1;
      const nrows=[];
      for(let r=0;r<nbRows;r++){
        const cells=[];
        for(let c=0;c<cols;c++){
          const k = c*2 + r; // colonne par colonne : 1,2 puis 3,4 ...
          cells.push(new TableCell({ borders:noBorders, margins:{top:GAP,bottom:GAP,left:GAP,right:GAP},
            children:[ k<norm.length ? mkImg(norm[k]) : blank() ] }));
        }
        nrows.push(new TableRow({ children:cells }));
      }
      const nested = new Table({ borders:noBorders, columnWidths:Array(cols).fill(colW),
        width:{ size:cols*colW, type:WidthType.DXA }, rows:nrows });
      photoCell = new TableCell({ verticalAlign:VerticalAlign.CENTER, margins:{top:80,bottom:80,left:90,right:90},
        children:[ nested, new Paragraph({ children:[], spacing:{before:0,after:0} }) ] });
    }
 
    const cell = (kids)=> new TableCell({ verticalAlign:VerticalAlign.CENTER, margins:{top:110,bottom:110,left:130,right:130}, children:kids });
    rows.push(new TableRow({ children:[
      cell([ new Paragraph({ children:[ new TextRun({ text:String(n), font:'Arial', size:19, color:'555555' }) ] }) ]),
      photoCell,
      cell([ new Paragraph({ children:[ new TextRun({ text:en.title||'(sans titre)', bold:true, font:'Arial', size:21, color:NAVY }) ] }),
             new Paragraph({ spacing:{before:50}, children:[ new TextRun({ text:fmt(en.when), font:'Arial', size:16, color:GREY }) ] }) ]),
      cell([ new Paragraph({ children:[ new TextRun({ text:en.comment||'—', font:'Arial', size:20, color:BODY }) ] }) ]),
    ]}));
    n++;
  }
 
  const bd={ style:BorderStyle.SINGLE, size:4, color:LINE };
  const table=new Table({
    width:{ size:9026, type:WidthType.DXA },
    columnWidths:[480,3600,2400,2546],
    borders:{ top:bd,bottom:bd,left:bd,right:bd,insideHorizontal:bd,insideVertical:bd },
    rows
  });
 
  const doc=new Document({
    sections:[{
      properties:{ page:{ size:{width:11906,height:16838}, margin:{top:1134,bottom:1134,left:1134,right:1134} } },
      headers:{ default:new Header({ children:headerKids }) },
      footers:{ default:new Footer({ children:[ new Paragraph({ alignment:AlignmentType.CENTER,
        children:[ new TextRun({ text:'ROBOPLANET — Inspection robotisée', font:'Arial', size:15, color:GREY }) ] }) ] }) },
      children:[
        new Paragraph({ spacing:{after:60}, children:[ new TextRun({ text:b.name||'Carnet photo', bold:true, font:'Arial', size:40, color:NAVY }) ] }),
        new Paragraph({ spacing:{after:260}, children:[ new TextRun({
          text:`${list.length} entrée${list.length>1?'s':''}  ·  généré le ${fmt(Date.now())}`, font:'Arial', size:18, color:GREY }) ] }),
        table
      ]
    }]
  });
 
  try{
    const blob = await Packer.toBlob(doc);
    const url = URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=(b.name||'carnet').replace(/[^\w\-]+/g,'_').slice(0,50)+'.docx';
    a.click(); URL.revokeObjectURL(url);
    toast('Word généré');
  }catch(e){ toast('Erreur pendant la génération'); }
  btn.disabled=false; btn.textContent=old;
}
 
boot();
</script>
